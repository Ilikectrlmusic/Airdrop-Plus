; ---------------------------- 说明 -----------------------------------------
; key: 密钥，需要设置成和快捷指令里的密钥相同
; save_path: 上传时文件的保存路径，例如 D:\新建文件夹。空着时默认保存到”个人文件夹/下载“
; port: 端口号，需要与快捷指令中保持一致
; basic_notifier: 是否使用旧版的通知模式，0关闭，1启动（如果通知无法正常运行，请把这个选择改成1）
; startup_notify：是否在软件启动时通知
; device_id: 设备识别码，首次运行自动生成6位（数字+小写字母），会被广播为 device_id.local
; auto_start: 是否开机自启动，1开启，0关闭；首次运行引导里可选择

; 改完配置文件要重启AirDropPlus才会生效！！！！！！
; --------------------------------------------------------------------------

; ---------------------------- Description ----------------------------------
; key: Secret key. Must be set to the same key as in the Shortcut.
; save_path: File save path when uploading, e.g., D:\NewFolder. If left empty, defaults to "User Folder/Downloads".
; port: Port number. Must match the port configured in the Shortcut.
; basic_notifier: Whether to use the legacy notification mode. 0 = disabled, 1 = enabled (if notifications do not work properly, set this to 1).
; startup_notify: Whether to show a notification when the software starts.
; device_id: Device identifier. Automatically generates a 6-character code (numbers + lowercase letters) on first run and will be broadcast as device_id.local.
; auto_start: Whether to start automatically on system boot. 1 = enabled, 0 = disabled. Can be selected during the first-run setup.

; Restart AirDropPlus after modifying the configuration file for changes to take effect!
; ---------------------------------------------------------------------------


[config]
key = 123456
save_path = 
port = 53843
basic_notifier = 0
startup_notify = 0
device_id = 
auto_start = 1

language = 
[info]
version = 1.5
